<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i love this app 👅</title>
    <style>
        /* Giao diện tối Dark UI siêu gọn, chống tràn, không thanh cuộn */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* Khung chứa ảnh/GIF bảo vệ tỷ lệ khung hình */
        .image-container {
            width: 95vw;
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Hiệu ứng mờ dần chuyển cảnh mượt mà trg 1s */
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 1;
            transition: opacity 1s ease-in-out;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        /* Lớp dùng để ẩn ảnh tạm thời khi bấm click */
        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="image-container" onclick="nextImage()">
        <img id="game-art" src="" alt="Discord Activity Art">
    </div>

    <script>
        // 🚀 MẢNG CHỨA 5 ẢNH/GIF BẤT TỬ ĐÃ ĐƯỢC CHÈN SẴN (2 GIFS + 3 IMAGES)
        // Sau này bro up ảnh lên GitHub thì cứ đổi đống này thành "ten_file.gif", "ten_file.png"... nha son!
        let danhSachAnh = [
            "https://i.pinimg.com/originals/ad/78/f7/ad78f73c5213a56d5a4205627ac7af5f.gif", // GIF 1
            "https://gifdb.com/images/thumbnail/adorable-anime-astolfo-blank-stare-1vcua8h305dw869w.gif", // GIF 2
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjjheJJfmgKXoLDhxtGAXDtAUUf0klLi57WTkHuu9gwA&s=10", // Ảnh 1 
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSsx895q3lAjUHTYYm-Mu5PGLjkzvgQTYXvJWiJ-IvxiQ&s=10", // Ảnh 2 
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSZd07x0OEYBkZC9168g0Usu8dDdrmFWBrYOB_y9J2myA&s=10"  // Ảnh 3
           "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOT44pli3nKpI46I6-dHIQxdicbBQyfjDT3XvAZeP9qg&s=10" // Ảnh 4
            "https://pin.it/4o5wujjOd" // Ảnh 5
        ];

        let indexHienTai = 0;
        const imgElement = document.getElementById("game-art");
        let dangChuyenAnh = false;

        // 🎲 Hàm Randomize - Trộn ngẫu nhiên đống ảnh/GIF ngay khi vừa vào game
        function xaoTronDanhSach(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]]; // Đổi chỗ các phần tử
            }
        }

        // Khởi động game: Trộn ảnh xong lôi cái đầu tiên lên chạy luôn (Bỏ nút Start)
        function khoiDongGame() {
            if (danhSachAnh.length > 0) {
                xaoTronDanhSach(danhSachAnh); // Quất quả trộn ngẫu nhiên luôn vrooo!
                imgElement.src = danhSachAnh[indexHienTai];
            }
        }

        // Hàm click thông minh: Mờ dần 1s -> Lên ảnh tiếp theo -> Hiện dần lên trg 1s + Tự động skip ảnh lỗi
        function nextImage() {
            if (dangChuyenAnh) return; // Chống spam click phá game khi đang mờ dần
            dangChuyenAnh = true;

            // Bước 1: Cho ảnh mờ dần trg 1s (Fade out)
            imgElement.classList.add("fade-out");

            setTimeout(() => {
                // Tính toán vị trí tiếp theo, chạm mốc cuối mảng thì tự động loop về 0
                indexHienTai = (indexHienTai + 1) % danhSachAnh.length;
                
                // Tạo ảnh ảo để test link trước (Bảo hiểm chống sập app)
                let imgTester = new Image();
                imgTester.src = danhSachAnh[indexHienTai];
                
                // Nếu link ảnh/GIF sống mượt mà -> Cho hiển thị thật
                imgTester.onload = () => {
                    imgElement.src = danhSachAnh[indexHienTai];
                    imgElement.classList.remove("fade-out"); // Hiện ảnh mới lên (Fade in)
                    dangChuyenAnh = false;
                };
                
                // Nếu dính link lỗi -> Tự động nhảy sang ảnh tiếp theo trg 0.1s luôn!
                imgTester.onerror = () => {
                    dangChuyenAnh = false;
                    nextImage(); // Gọi lại chính nó để skip ảnh tạch
                };
            }, 1000); // Chờ đúng 1s mờ hết ảnh cũ rồi mới đổi link
        }

        // Kích hoạt chạy game luôn bách phát bách trúng
        khoiDongGame();
    </script>
</body>
</html>
