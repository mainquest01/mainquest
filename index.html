<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i love this app 👅</title>
    <style>
        /* Giao diện tối Dark UI siêu gọn, chống tràn, không thanh cuộn */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* Khung chứa ảnh/GIF bảo vệ tỷ lệ khung hình */
        .image-container {
            width: 95vw;
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-color: #121212; /* Đảm bảo nền khung là đen tuyệt đối */
        }

        /* Hiệu ứng mờ dần chuyển cảnh + Tự động hòa trộn nền ảnh vào nền đen */
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 1;
            transition: opacity 1s ease-in-out;
            border-radius: 16px;
            
            /* 🌟 MẸO TỐI THƯỢNG: Hòa trộn nền ảnh xám/tối thẳng vào màu nền đen, nổi bật nhân vật */
            mix-blend-mode: screen; 
            filter: contrast(1.1) brightness(1); /* Tăng nhẹ độ tương phản để nhân vật tách biệt hơn */
        }

        /* Lớp dùng để ẩn ảnh tạm thời khi bấm click */
        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="image-container" onclick="nextImage()">
        <img id="game-art" src="" alt="Discord Activity Art">
    </div>

    <script>
        // 🚀 MẢNG 6 ẢNH/GIF NGON NGHẺ (ĐÃ XOÁ SẠCH LINK PIN LỖI THEO Ý BRO)
        let danhSachAnh = [
            "https://i.pinimg.com/originals/ad/78/f7/ad78f73c5213a56d5a4205627ac7af5f.gif", // GIF 1
            "https://gifdb.com/images/thumbnail/adorable-anime-astolfo-blank-stare-1vcua8h305dw869w.gif", // GIF 2
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjjheJJfmgKXoLDhxtGAXDtAUUf0klLi57WTkHuu9gwA&s=10", // Ảnh 1 
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSsx895q3lAjUHTYYm-Mu5PGLjkzvgQTYXvJWiJ-IvxiQ&s=10", // Ảnh 2 
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSZd07x0OEYBkZC9168g0Usu8dDdrmFWBrYOB_y9J2myA&s=10", // Ảnh 3
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOT44pli3nKpI46I6-dHIQxdicbBQyfjDT3XvAZeP9qg&s=10",  // Ảnh 4
            "https://i.pinimg.com/736x/66/99/8f/66998fcb203512c01af0f0c46aa34ef3.jpg", //Ảnh 5
            "https://i.pinimg.com/736x/10/2a/02/102a029e2d1209a7d55bb239a3bb012f.jpg", //Ảnh 6
            "https://i.pinimg.com/736x/ff/ad/86/ffad866d1bf00fbcf8624f23827d4c47.jpg", //Ảnh 7
            "https://i.pinimg.com/736x/dd/04/43/dd0443c5075f2f4cc9731d8ca259037e.jpg", //Ảnh 8
            "https://i.pinimg.com/736x/43/35/fe/4335fea96d74c6617b1adbc27de09dd7.jpg" //Ảnh 9
        ];

        let indexHienTai = 0;
        const imgElement = document.getElementById("game-art");
        let dangChuyenAnh = false;

        // 🎲 Hàm Randomize - Trộn ngẫu nhiên đống ảnh/GIF ngay khi vừa vào game
        function xaoTronDanhSach(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]]; 
            }
        }

        // Khởi động game: Trộn ảnh xong lôi cái đầu tiên lên chạy luôn
        function khoiDongGame() {
            if (danhSachAnh.length > 0) {
                xaoTronDanhSach(danhSachAnh); 
                imgElement.src = danhSachAnh[indexHienTai];
            }
        }

        // Hàm click thông minh: Mờ dần 1s -> Lên ảnh tiếp theo -> Hiện dần lên trg 1s + Tự động skip ảnh lỗi
        function nextImage() {
            if (dangChuyenAnh) return; 
            dangChuyenAnh = true;

            imgElement.classList.add("fade-out");

            setTimeout(() => {
                indexHienTai = (indexHienTai + 1) % danhSachAnh.length;
                
                let imgTester = new Image();
                imgTester.src = danhSachAnh[indexHienTai];
                
                imgTester.onload = () => {
                    imgElement.src = danhSachAnh[indexHienTai];
                    imgElement.classList.remove("fade-out"); 
                    dangChuyenAnh = false;
                };
                
                imgTester.onerror = () => {
                    dangChuyenAnh = false;
                    nextImage(); 
                };
            }, 1000); 
        }

        khoiDongGame();
    </script>
</body>
</html>
